name = "ramsey-ratio-lean"
version = "0.1.0"
defaultTargets = ["RamseyRatio"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0-rc1"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso.git"
rev = "v4.28.0-rc1"

[[lean_lib]]
name = "RamseyRatio"

[[lean_lib]]
name = "Manual"
roots = ["Manual"]

[[lean_exe]]
name = "manual"
root = "ManualMain"
